name: Release wheel

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and release, for example v0.9.4
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-wheel:
    name: Build wheel and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Set release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(
            python - <<'PY'
          import ast

          with open("pybaram/_version.py", "r", encoding="utf-8") as f:
              tree = ast.parse(f.read(), filename="pybaram/_version.py")

          for node in tree.body:
              if (
                  isinstance(node, ast.Assign)
                  and any(
                      isinstance(target, ast.Name) and target.id == "__version__"
                      for target in node.targets
                  )
              ):
                  print(ast.literal_eval(node.value))
                  break
          else:
              raise SystemExit("__version__ not found")
          PY
          )"
          tag_version="${{ steps.release.outputs.tag }}"
          tag_version="${tag_version#v}"

          if [ "${package_version}" != "${tag_version}" ]; then
            echo "Package version ${package_version} does not match release tag ${{ steps.release.outputs.tag }}" >&2
            exit 1
          fi

      - name: Install build frontend
        run: python -m pip install --upgrade build

      - name: Build wheel
        run: python -m build --wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pybaram-wheel
          path: dist/*.whl
          if-no-files-found: error

      - name: Create release and upload wheel
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/*.whl --clobber
          else
            gh release create "${tag}" dist/*.whl \
              --title "${tag}" \
              --generate-notes
          fi
