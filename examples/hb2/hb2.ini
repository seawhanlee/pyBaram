[backend-cpu]
multi-thread=single

[constants]
gamma = 1.4
pr = 0.72
prt = 0.9
re = 1.7e6
lref = 1.0
mach = 2.0
aoa = 0
rhof = 1.0
uf = %(mach)s
pf = 1/%(gamma)s
mu = %(mach)s/%(Re)s*%(lref)s
kf = 0.01*%(uf)s*%(uf)s/%(Re)s
omegaf = %(uf)s/1
pmin = 1e-4

[solver]
system = rans-kwsst
order = 2
limiter = mlp-u2
u2k = 0.1
riemann-solver = rotated-roem

[solver-time-integrator]
mode = steady
cfl = 5.0
stepper = lu-sgs
max-iter = 10000
tolerance = 1e-5

[soln-ics]
rho = rhof
u = uf*cos(aoa/180*pi)
v = 0
w = uf*sin(aoa/180*pi)
p = pf
k = kf
omega = omegaf

[soln-bcs-far]
type = far
rho = rhof
u = uf*cos(aoa/180*pi)
v = 0
w = uf*sin(aoa/180*pi)
p = pf
k = kf
omega = omegaf

[soln-bcs-forebody]
type = adia-wall

[soln-bcs-base]
type = adia-wall

[soln-plugin-writer]
name = out-{n}
iter-out = 500

[soln-plugin-stats]
iter-out = 500

[soln-plugin-force-forebody]
iter-out = 50
rho = rhof
vel = uf
p = pf
area = pi/4
length = 1
force-dir-name = xyz
force-dir-x = 1, 0, 0
force-dir-y = 0, 1, 0
force-dir-z = 0, 0, 1
moment-center = 1.95, 0, 0
moment-dir-name = lmn
moment-dir-l =-1, 0, 0
moment-dir-m = 0, 1, 0
moment-dir-n = 0, 0,-1

[soln-plugin-force-base]
iter-out = 50
rho = rhof
vel = uf
p = pf
area = pi/4
length = 1
force-dir-name = x
force-dir-x = 1, 0, 0
moment-center = 1.95, 0, 0
moment-dir-name = l
moment-dir-l = -1, 0, 0

