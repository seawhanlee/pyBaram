[backend-cpu]
multi-thread=omp

[constants]
gamma = 1.4
pr = 0.72
prt = 0.9
re = 1.7e6
lref = 1.0
mach = 2.0
rhof = 1.0
uf = %(mach)s
pf = 1/%(gamma)s
mu = %(mach)s/%(Re)s*%(lref)s
kf = 0.01*%(uf)s*%(uf)s/%(Re)s
omegaf = %(uf)s/1
pmin = 1e-4

[solver]
system = rans-kwsst
order = 2
limiter = mlp-u2
u2k = 0.1
riemann-solver = rotated-roem
axisymmetric-axis = x

[solver-time-integrator]
mode = steady
cfl = 5.0
stepper = colored-lu-sgs
max-iter = 10000
tolerance = 1e-5

[soln-ics]
rho = rhof
u = uf
v = 0
p = pf
k = kf
omega = omegaf

[soln-bcs-far]
type = far
rho = rhof
u = uf
v = 0
p = pf
k = kf
omega = omegaf

[soln-bcs-forebody]
type = adia-wall

[soln-bcs-base]
type = adia-wall

[soln-bcs-sym]
type= slip-wall

[soln-plugin-writer]
name = out-{n}
iter-out = 2000

[soln-plugin-stats]
iter-out = 500

[soln-plugin-force-forebody]
iter-out = 100
rho = rhof
vel = uf
p = pf
area = 1/8
length = 1
force-dir-name = x
force-dir-x = 1, 0
moment-center = 1.95, 0
moment-dir-name = m
moment-dir-m = -1

[soln-plugin-force-base]
iter-out = 100
rho = rhof
vel = uf
p = pf
area = 1/8
length = 1
force-dir-name = x
force-dir-x = 1, 0
moment-center = 1.95, 0
moment-dir-name = m
moment-dir-m = -1

