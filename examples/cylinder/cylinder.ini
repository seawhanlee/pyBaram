[backend-cpu]
multi-thread=omp

[constants]
gamma = 1.4
Pr = 0.72
Re = 150
lref = 1.0
mach = 0.2
rhof = 1.0
uf = 1.0
pf = 1/%(gamma)s/%(mach)s/%(mach)s
mu = %(lref)s/%(Re)s

[solver]
system = navier-stokes
order = 2
riemann-solver = roe

[solver-time-integrator]
mode = unsteady-dts
stepper = bdf2
relaxation = colored-blu-sgs
time = 0, 100.0
dt = 0.1
sub-cfl = 100
sub-iter = 50
sub-tol = 1e-3

[soln-ics]
rho = rhof
u = uf
v = 0
p = pf

[soln-bcs-inflow]
type = far
rho = rhof
u = uf
v = 0
p = pf

[soln-bcs-outflow]
type = far
rho = rhof
u = uf
v = 0
p = pf

[soln-bcs-sym]
type = far
rho = rhof
u = uf
v = 0
p = pf

[soln-bcs-wall]
type = adia-wall

[soln-plugin-writer]
name = out-{t:.2f}
dt-out = 5.0

[soln-plugin-stats]

[soln-plugin-force-wall]
rho = rhof
vel = uf
p = pf
area = lref
force-dir-name = ld
force-dir-l = 0, 1
force-dir-d = 1, 0
moment-center = 0.0, 0.0
moment-dir-name = m
moment-dir-z = -1
